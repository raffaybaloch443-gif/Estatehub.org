<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>EstateHub - Login</title><link rel="stylesheet" href="./css/style.css"></head>
<body>
  <header class="topbar"><a class="brand" href="index.html"><span class="brand-icon">&#8962;</span>EstateHub</a><nav class="nav"><a href="index.html">Home</a><a href="properties.html">Properties</a><a href="about.html">About Us</a><a href="messages.html">Contact</a></nav></header>
  <main class="auth-wrap">
    <form class="auth-card">
      <h1>Welcome Back</h1><p class="muted" style="text-align:center">Login to your account</p>
      <div class="tabs"><button type="button">Buyer</button><button type="button" class="active">Seller</button></div>
      <div class="form-stack">
        <div class="field"><label>Email Address</label><input type="email" placeholder="Enter email address"></div>
        <div class="field"><label>Password</label><input type="password" placeholder="Enter password"></div>
        <div style="display:flex;justify-content:space-between;gap:12px"><label class="checkline"><input type="checkbox"> Remember Me</label><a class="muted" href="#">Forgot Password?</a></div>
        <a class="btn" href="dashboard.html">Login</a>
        <p class="muted" style="text-align:center">Don't have an account? <a href="register.html">Register</a></p>
      </div>
    </form>
  </main>
  <script src="./js/script.js"></script>
</body>
</html>

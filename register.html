<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>EstateHub - Register</title><link rel="stylesheet" href="./css/style.css"></head>
<body>
  <header class="topbar"><a class="brand" href="index.html"><span class="brand-icon">&#8962;</span>EstateHub</a><nav class="nav"><a href="index.html">Home</a><a href="properties.html">Properties</a><a href="#">About Us</a><a href="messages.html">Contact</a></nav></header>
  <main class="auth-wrap">
    <form class="auth-card">
      <h1>Register</h1><p class="muted" style="text-align:center">Create your account</p>
      <div class="tabs"><button type="button" class="active">Buyer</button><button type="button">Seller</button></div>
      <div class="form-stack">
        <div class="field"><label>Full Name</label><input placeholder="Enter full name"></div>
        <div class="field"><label>Email Address</label><input type="email" placeholder="Enter email address"></div>
        <div class="field"><label>Phone Number</label><input placeholder="Enter phone number"></div>
        <div class="field"><label>Password</label><input type="password" placeholder="Enter password"></div>
        <div class="field"><label>Confirm Password</label><input type="password" placeholder="Confirm password"></div>
        <label class="checkline"><input type="checkbox"> I agree to the Terms & Conditions</label>
        <button class="btn" type="submit">Register</button>
        <p class="muted" style="text-align:center">Already have an account? <a href="login.html">Login</a></p>
      </div>
    </form>
  </main>
  <script src="./js/script.js"></script>
</body>
</html>
